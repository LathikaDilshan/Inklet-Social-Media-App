spring.application.name=inklet

# Database Connection Properties
spring.datasource.url=jdbc:postgresql://localhost:5432/inklet
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties (for schema management and SQL logging)
spring.jpa.hibernate.ddl-auto=update
# Recommended for development to update schema automatically
spring.jpa.show-sql=true
# To see the SQL queries generated by Hibernate in the console
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect